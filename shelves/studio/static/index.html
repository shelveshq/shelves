<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shelves Studio</title>

  <!-- Vega / Vega-Lite / vega-embed (global scripts for chart rendering) -->
  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@6"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <!-- xterm.js CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.min.css">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">

  <!-- Styles -->
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div class="sh-header-left">
      <div class="sh-logo">
        <svg viewBox="0 0 90 72" fill="none">
          <rect x="28" y="2" width="58" height="14" rx="7" fill="#2A2A2A"/>
          <rect x="20" y="28" width="38" height="14" rx="7" fill="#D85A30"/>
          <rect x="4" y="54" width="58" height="14" rx="7" fill="#2A2A2A"/>
        </svg>
      </div>
      <span class="sh-brand">Shelves Studio</span>
      <span class="sh-crumb-sep">/</span>
      <span class="sh-crumb"><span class="sh-crumb-none">no file open</span></span>
    </div>
    <div class="sh-header-right">
      <button class="sh-btn sh-btn-primary">Publish</button>
    </div>
  </div>

  <!-- Main workspace -->
  <div id="workspace">
    <div id="sidebar">
      <div id="sidebar-header">
        <span>Project</span>
        <button id="sidebar-toggle-inner" title="Collapse sidebar">&#9664;</button>
      </div>
      <div id="file-tree"></div>
    </div>
    <div id="editor-pane">
      <div id="editor"></div>
    </div>
    <div id="resize-handle"></div>
    <div id="preview-pane">
      <div id="preview-header">
        <div style="display:flex;align-items:center">
          <span class="sh-preview-label">Preview</span>
          <span class="sh-preview-ambient"></span>
        </div>
        <div class="sh-preview-right">
          <div id="view-toggles" class="sh-seg">
            <button class="sh-seg-btn is-active" data-view="chart">Chart</button>
            <button class="sh-seg-btn" data-view="json">JSON</button>
          </div>
        </div>
      </div>
      <div id="preview">
        <div id="chart-card">
          <div id="chart-container">
            <div class="preview-placeholder">Open a YAML file to see the chart preview</div>
          </div>
        </div>
      </div>
      <div id="dashboard-preview">
        <iframe id="dashboard-iframe" sandbox="allow-scripts"></iframe>
      </div>
      <pre id="json-view"></pre>
      <div id="error-overlay"></div>
    </div>
  </div>

  <!-- Terminal Panel -->
  <div id="terminal-panel" class="collapsed">
    <div id="terminal-resize-handle"></div>
    <div id="terminal-header">
      <div id="terminal-tabs"></div>
      <div id="terminal-actions">
        <button id="terminal-new" title="New terminal">+</button>
        <button id="terminal-toggle" title="Toggle terminal">&#9660;</button>
      </div>
    </div>
    <div id="terminal-container"></div>
  </div>

  <!-- Status Bar -->
  <div id="statusbar">
    <div class="sh-status-left">
      <span class="sh-status-dot"></span>
      <span class="sh-status-msg">No file open</span>
    </div>
    <div class="sh-status-right">
      <button class="sh-status-term" title="Toggle terminal (Ctrl+`)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line>
        </svg>
        Terminal
      </button>
      <span class="sh-status-sep"></span>
      <span class="sh-status-item">YAML</span>
      <span class="sh-status-item">UTF-8</span>
    </div>
  </div>

  <!-- Command Palette (placeholder) -->
  <div id="command-palette"></div>

  <!-- Application modules -->
  <script type="module" src="/static/js/main.js"></script>
</body>
</html>
