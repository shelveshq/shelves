# Phase 1a fixture — dual axis (revenue bars + ARPU line)
sheet: "Revenue & ARPU by Week"
data: orders

cols: week
rows:
  - measure: revenue
    mark: bar
    color: country
    detail: country
    layer:
      - measure: arpu
        mark:
          type: line
          style: dashed
        color: "#666666"
    axis: independent

tooltip: [week, country, revenue, arpu]
