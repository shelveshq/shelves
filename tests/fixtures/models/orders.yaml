model: orders
label: Orders
description: Transactional order data

source:
  type: inline
  path: data/orders.json

measures:
  revenue:
    label: Revenue
    format: "$,.0f"
    description: Total revenue in USD
    defaultSort: descending
    aggregation: sum
  order_count:
    label: Orders
    format: ",.0f"
  arpu:
    label: ARPU
    format: "$,.2f"
    description: Average revenue per user
    aggregation: avg
  cost:
    label: Cost
    format: "$,.0f"
  margin_pct:
    label: Margin %
    format: ".1%"

dimensions:
  country:
    label: Country
    defaultSort: ascending
    sortOrder: ["US", "UK", "FR", "DE", "JP"]
  region:
    label: Region
  product:
    label: Product
    type: nominal
  week:
    type: temporal
    label: Week
    defaultGrain: week
    format:
      day: "%b %d, %Y"
      week: "%b %d"
      month: "%b %Y"
      year: "%Y"
  month:
    type: temporal
    label: Month
    defaultGrain: month
    format:
      month: "%b %Y"
      quarter: "Q%q %Y"
      year: "%Y"
